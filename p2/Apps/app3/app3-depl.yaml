apiVersion: apps/v1
kind: Deployment
metadata:
  name: app3-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      component: app3
  template:
    metadata:
      labels:
        component: app3
    spec:
      containers:
        - name: app3
          image: nginx
          ports:
          - containerPort: 80