apiVersion: apps/v1
kind: Deployment
metadata: 
  name: app1-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      component: app1
  template:
    metadata:
      labels:
        component: app1
    spec:
      containers:
        - name: app1
          image: nginx
          ports:
          - containerPort: 80